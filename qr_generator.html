<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Batch Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
font-family:Arial;
padding:20px;
text-align:center;
background:#f5f5f5;
}

button{
padding:15px 25px;
font-size:18px;
margin:10px;
border:none;
border-radius:10px;
background:#ff6f00;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<h2>Arabic QR Generator</h2>

<button onclick="generate()">Generate All QR Codes</button>

<div id="grid" class="grid"></div>

<script>

const base = "https://busymommh.github.io/ArabicFunLetters/funletters.html#";

const letters = [
"alif","baa","taa","thaa","jeem","haa","khaa",
"daal","zaal","raa","zay","seen","sheen",
"saad","daad","taa2","zaa","ayn","ghayn",
"faa","qaaf","kaaf","laam","meem","noon",
"haa2","waw","yaa"
];

function generate(){

const grid = document.getElementById("grid");
grid.innerHTML = "";

letters.forEach(letter => {

const url = base + letter;

const div = document.createElement("div");
div.className = "card";

const title = document.createElement("div");
title.innerHTML = "<b>" + letter.toUpperCase() + "</b>";

const qrDiv = document.createElement("div");

div.appendChild(title);
div.appendChild(qrDiv);
grid.appendChild(div);

new QRCode(qrDiv, {
text: url,
width: 120,
height: 120
});

});

}

</script>

</body>
</html>
