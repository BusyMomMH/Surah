<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Surah Player</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 40px;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    cursor: pointer;
    margin-top: 20px;
}

h2 {
    margin-bottom: 10px;
}

.small {
    color: #666;
}
</style>
</head>

<body>

<h2 id="title">Loading...</h2>
<div class="small" id="file"></div>

<button onclick="playAudio()">▶ Play</button>

<script>

let audio;

function init() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (!id) {
        document.getElementById("title").innerText = "No Surah Selected";
        return;
    }

    const url =
    "https://raw.githubusercontent.com/BusyMomMH/Surah/main/" + id + ".mp3";

    document.getElementById("title").innerText = id;
    document.getElementById("file").innerText = url;

    audio = new Audio(url);
    audio.load();

    // try autoplay (may work on some devices)
    audio.play().catch(() => {
        console.log("Autoplay blocked - user must press play");
    });
}

function playAudio() {
    if (audio) {
        audio.play();
    }
}

init();

</script>

</body>
</html>
