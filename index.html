<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surah Player</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#071b12,#0f5132);
  color:white;
  text-align:center;
}

h1{
  margin-top:20px;
  font-size:2.2rem;
  background:linear-gradient(90deg,#f4c430,#fff,#f4c430);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.tile{
  margin:25px auto;
  width:90%;
  max-width:500px;
  padding:35px;
  border-radius:25px;
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 25px rgba(244,196,48,0.2);
  font-size:1.4rem;
  font-weight:bold;
  animation: glow 2.5s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px rgba(244,196,48,0.2);}
  to{box-shadow:0 0 30px rgba(244,196,48,0.5);}
}

.controls{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:25px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(90deg,#f4c430,#ffe38a);
  color:black;
}

button:active{
  transform:scale(0.95);
}

#overlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.75);
  z-index:999;
}

#overlay div{
  padding:25px;
  border-radius:18px;
  font-size:20px;
  background:linear-gradient(90deg,#f4c430,#ffe38a);
  color:black;
  font-weight:bold;
}

#endScreen{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:12px;
  background:rgba(0,0,0,0.85);
  z-index:1000;
}

#endScreen button{
  width:200px;
}
</style>
</head>

<body>

<h1 id="title">Loading...</h1>

<div class="tile" id="tile">Loading Surah...</div>

<div class="controls">
  <button onclick="playAudio()">▶ Play</button>
  <button onclick="pauseAudio()">⏸ Pause</button>
  <button onclick="stopAudio()">⏹ Stop</button>
  <button onclick="toggleLoop()" id="loopBtn">🔁 Loop OFF</button>
</div>

<audio id="audio" preload="auto"></audio>

<div id="overlay">
  <div>▶ Tap Anywhere to Play</div>
</div>

<div id="endScreen">
  <h3 style="margin-bottom:10px">Finished</h3>
  <button onclick="replay()">🔄 Replay</button>
  <button onclick="toggleLoop()">🔁 Loop</button>
  <button onclick="closeEnd()">❌ Close</button>
</div>

<script>

const surahMap = {
"A1":"Al Fatiha",
"A2":"Al Ikhlas",
"A3":"Al Falaq",
"A4":"An Naas",
"A5":"Al Feel",
"A6":"Quraish",
"A7":"Al Ma'un",
"A8":"Al Kawther",
"A9":"Al Kafiroon",
"A10":"An Nasr",
"A11":"Al Masad",
"A12":"Takbir",
"A13":"Azan",
"A14":"Second Kalima",
"A15":"Ad Duha",
"A16":"Innal Muslimeena wal Muslimaati"
};

// SHIFT RULE: A5.mp3 = A1
const SHIFT = 4;

const id = new URLSearchParams(location.search).get("id");
const num = parseInt(id.replace("A",""));

const name = surahMap[id] || "Surah";

document.getElementById("title").innerText = name;
document.getElementById("tile").innerText = name;

const audio = document.getElementById("audio");
const fileNum = num + SHIFT;
audio.src = `A${fileNum}.mp3`;

const overlay = document.getElementById("overlay");
const endScreen = document.getElementById("endScreen");

let isLoop = false;

function playAudio(){
  audio.play().catch(()=>{
    overlay.style.display="flex";
  });
  overlay.style.display="none";
}

function pauseAudio(){ audio.pause(); }

function stopAudio(){
  audio.pause();
  audio.currentTime=0;
}

function toggleLoop(){
  isLoop = !isLoop;
  audio.loop = isLoop;
  document.getElementById("loopBtn").innerText =
    isLoop ? "🔁 Loop ON" : "🔁 Loop OFF";
}

function replay(){
  endScreen.style.display="none";
  audio.currentTime=0;
  audio.play();
}

function closeEnd(){
  endScreen.style.display="none";
}

window.addEventListener("load", ()=>{
  audio.load();
  playAudio();
});

audio.onended = ()=>{
  if(!isLoop){
    endScreen.style.display="flex";
  }
};

overlay.addEventListener("click", playAudio);

</script>

</body>
</html>
