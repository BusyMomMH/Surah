<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Surah Player</title>

<style>

body{
    font-family:Arial,sans-serif;
    text-align:center;
    padding:40px;
    background:#f5f5f5;
}

h2{
    margin-bottom:25px;
}

button{
    padding:15px 25px;
    font-size:18px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#playBtn{
    background:#2d7ef7;
    color:white;
}

#loopBtn{
    background:#444;
    color:white;
}

#status{
    margin-top:15px;
    color:#666;
    font-size:14px;
    word-break:break-word;
}

</style>
</head>

<body>

<h2 id="title">Loading...</h2>

<button id="playBtn" onclick="togglePlay()">
▶ Play
</button>

<button id="loopBtn" onclick="toggleLoop()">
🔁 Loop OFF
</button>

<div id="status"></div>

<script>

let audio;
let isPlaying = false;
let isLoop = false;

// =======================
// INIT
// =======================

function init(){

    const params =
    new URLSearchParams(window.location.search);

    const id = params.get("id");

    if(!id){

        document.getElementById("title")
        .innerText = "No Surah Selected";

        return;
    }

    document.getElementById("title")
    .innerText = id;

    // MP3 URL
    const url =
    "https://raw.githubusercontent.com/BusyMomMH/Surah/main/"
    + id +
    ".mp3";

    document.getElementById("status")
    .innerText = url;

    // CREATE AUDIO
    audio = new Audio(url);

    audio.load();

    // TRY AUTOPLAY
    tryAutoPlay();

    // RESET BUTTON WHEN FINISHED
    audio.onended = function(){

        isPlaying = false;

        document.getElementById("playBtn")
        .innerText = "▶ Play";
    };

}

// =======================
// TRY AUTOPLAY
// =======================

function tryAutoPlay(){

    if(!audio) return;

    audio.play()

    .then(() => {

        isPlaying = true;

        document.getElementById("playBtn")
        .innerText = "⏸ Pause";

    })

    .catch(() => {

        document.getElementById("status")
        .innerText +=
        "\n\nTap Play if autoplay is blocked.";

    });

}

// =======================
// PLAY / PAUSE
// =======================

function togglePlay(){

    if(!audio) return;

    if(!isPlaying){

        audio.play();

        isPlaying = true;

        document.getElementById("playBtn")
        .innerText = "⏸ Pause";

    }else{

        audio.pause();

        isPlaying = false;

        document.getElementById("playBtn")
        .innerText = "▶ Play";
    }

}

// =======================
// LOOP TOGGLE
// =======================

function toggleLoop(){

    if(!audio) return;

    isLoop = !isLoop;

    audio.loop = isLoop;

    document.getElementById("loopBtn")
    .innerText =
    isLoop
    ? "🔁 Loop ON"
    : "🔁 Loop OFF";

}

// START
init();

</script>

</body>
</html>
