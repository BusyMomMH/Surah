<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Surah Player</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f5132, #145a32, #1e7e34);
  color: white;
  text-align: center;
}

/* main layout */
.container {
  padding: 40px 20px;
}

h1 {
  font-size: 2.2rem;
  background: linear-gradient(90deg, #f4c430, #fff, #f4c430);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

h2 {
  font-size: 1rem;
  opacity: 0.85;
}

/* TAP ANYWHERE OVERLAY */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 999;
}

#overlay div {
  font-size: 22px;
  padding: 20px 30px;
  border-radius: 20px;
  background: linear-gradient(90deg, #f4c430, #ffdf70);
  color: black;
  font-weight: bold;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* subtle card */
.card {
  margin-top: 30px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<div class="container">
  <h1 id="title">Loading...</h1>
  <h2>Audio will play automatically</h2>

  <div class="card">
    Preparing audio...
  </div>
</div>

<!-- TAP ANYWHERE OVERLAY -->
<div id="overlay">
  <div>▶ Tap Anywhere to Play</div>
</div>

<audio id="audio" preload="auto"></audio>

<script>

// ===== SURAH MAP =====
const map = {
"A1":"Al Fatiha",
"A2":"Al Ikhlas",
"A3":"Al Falaq",
"A4":"An Naas",
"A5":"Al Feel",
"A6":"Quraish",
"A7":"Al Ma'un",
"A8":"Al Kawther",
"A9":"Al Kafiroon",
"A10":"An Nasr",
"A11":"Al Masad",
"A12":"Takbir",
"A13":"Azan",
"A14":"Second Kalima",
"A15":"Ad Duha",
"A16":"Innal Muslimeena wal Muslimaati"
};

// GET ID
const id = new URLSearchParams(window.location.search).get("id");

// TITLE
document.getElementById("title").innerText = map[id] || "Surah";

// AUDIO
const audio = document.getElementById("audio");
audio.src = id + ".mp3";

const overlay = document.getElementById("overlay");

// PLAY FUNCTION
async function playAudio() {
  try {
    await audio.play();
    overlay.style.display = "none";
  } catch (e) {
    overlay.style.display = "flex";
  }
}

// AUTO PLAY ON LOAD
window.addEventListener("load", playAudio);

// TAP ANYWHERE TO PLAY
overlay.addEventListener("click", async () => {
  try {
    await audio.play();
    overlay.style.display = "none";
  } catch (e) {
    overlay.innerHTML = "<div>Tap again</div>";
  }
});

</script>

</body>
</html>
