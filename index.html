<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Surah Player</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top,#0f5132,#061a12);
  color:white;
  text-align:center;
}

/* HEADER */
h1{
  margin-top:25px;
  font-size:2.2rem;
  background:linear-gradient(90deg,#f4c430,#fff,#f4c430);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

h2{opacity:0.8;font-size:1rem}

/* CARD */
.card{
  margin:20px auto;
  padding:20px;
  width:85%;
  max-width:420px;
  border-radius:18px;
  background:rgba(255,255,255,0.08);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* BUTTONS */
.controls{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:25px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(90deg,#f4c430,#ffe38a);
  color:black;
}

/* OVERLAY */
#overlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.75);
  z-index:999;
}

#overlay div{
  padding:25px;
  border-radius:18px;
  font-size:20px;
  background:linear-gradient(90deg,#f4c430,#ffe38a);
  color:black;
  font-weight:bold;
}

/* END SCREEN */
#endScreen{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:12px;
  background:rgba(0,0,0,0.85);
  z-index:1000;
}

#endScreen button{
  width:200px;
}
</style>
</head>

<body>

<h1 id="title">Loading...</h1>
<h2 id="subtitle">Audio Player</h2>

<div class="card">
  <div id="status">Preparing audio...</div>
</div>

<div class="controls">
  <button onclick="playAudio()">▶ Play</button>
  <button onclick="pauseAudio()">⏸ Pause</button>
  <button onclick="stopAudio()">⏹ Stop</button>
  <button onclick="toggleLoop()" id="loopBtn">🔁 Loop OFF</button>
</div>

<audio id="audio" preload="auto"></audio>

<!-- TAP ANYWHERE -->
<div id="overlay">
  <div>▶ Tap Anywhere to Play</div>
</div>

<!-- END SCREEN -->
<div id="endScreen">
  <div style="font-size:18px;margin-bottom:10px;">Finished</div>
  <button onclick="replay()">🔄 Replay</button>
  <button onclick="toggleLoop()">🔁 Loop</button>
  <button onclick="closeEnd()">❌ Close</button>
</div>

<script>

/* =========================
   SURAH NAME MAPPING
========================= */
const surahMap = {
"A1":"Al Fatiha",
"A2":"Al Ikhlas",
"A3":"Al Falaq",
"A4":"An Naas",
"A5":"Al Feel",
"A6":"Quraish",
"A7":"Al Ma'un",
"A8":"Al Kawther",
"A9":"Al Kafiroon",
"A10":"An Nasr",
"A11":"Al Masad",
"A12":"Takbir",
"A13":"Azan",
"A14":"Second Kalima",
"A15":"Ad Duha",
"A16":"Innal Muslimeena wal Muslimaati"
};

/* =========================
   AUTO SHIFT AUDIO RULE
   YOUR RULE:
   A5.mp3 = A1
   A6.mp3 = A2
   => SHIFT = +4
========================= */
const SHIFT = 4;

/* ========================= */
const id = new URLSearchParams(location.search).get("id");
const num = parseInt(id.replace("A",""));

/* TITLE */
document.getElementById("title").innerText =
  surahMap[id] || "Surah";

/* AUDIO FILE */
const audio = document.getElementById("audio");
const fileNum = num + SHIFT;

/* safe missing handling */
audio.src = fileNum ? `A${fileNum}.mp3` : "";

/* UI */
const overlay = document.getElementById("overlay");
const endScreen = document.getElementById("endScreen");
const status = document.getElementById("status");

let isLoop = false;

/* =========================
   PLAY SYSTEM
========================= */
async function playAudio(){
  if(!audio.src){
    status.innerText = "Audio not available yet";
    return;
  }

  try{
    await audio.play();
    overlay.style.display="none";
    status.innerText="Playing...";
  }catch(e){
    overlay.style.display="flex";
  }
}

function pauseAudio(){
  audio.pause();
  status.innerText="Paused";
}

function stopAudio(){
  audio.pause();
  audio.currentTime=0;
  status.innerText="Stopped";
}

function toggleLoop(){
  isLoop = !isLoop;
  audio.loop = isLoop;
  document.getElementById("loopBtn").innerText =
    isLoop ? "🔁 Loop ON" : "🔁 Loop OFF";
}

function replay(){
  endScreen.style.display="none";
  audio.currentTime=0;
  audio.play();
}

function closeEnd(){
  endScreen.style.display="none";
}

/* =========================
   AUTO PLAY
========================= */
window.addEventListener("load", playAudio);

/* TAP ANYWHERE */
overlay.addEventListener("click", playAudio);

/* =========================
   END HANDLING FIX
========================= */
audio.onended = () => {
  if(!isLoop){
    endScreen.style.display="flex";
    status.innerText="Finished";
  }
};

</script>

</body>
</html>
