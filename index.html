<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Surah Instant Player</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 40px;
    background: #f7f7f7;
}

h2 {
    margin-bottom: 20px;
}

button {
    padding: 20px 35px;
    font-size: 22px;
    border: none;
    border-radius: 10px;
    background: #2d7ef7;
    color: white;
    cursor: pointer;
}

button:active {
    transform: scale(0.98);
}

.small {
    margin-top: 15px;
    color: #666;
    font-size: 14px;
}
</style>
</head>

<body>

<h2 id="title">Loading...</h2>

<button id="btn" onclick="playAudio()">▶ Tap if needed</button>

<div class="small" id="status"></div>

<script>

let audio;
let played = false;

function init() {

    const id = new URLSearchParams(window.location.search).get("id");

    if (!id) {
        document.getElementById("title").innerText = "No Surah Selected";
        return;
    }

    document.getElementById("title").innerText = id;

    const url =
    "https://raw.githubusercontent.com/BusyMomMH/Surah/main/" + id + ".mp3";

    audio = new Audio(url);
    audio.load();

    document.getElementById("status").innerText = "Loading audio...";

    // 🔥 INSTANT PLAY ATTEMPT
    const tryPlay = () => {
        if (played) return;
        audio.play().then(() => {
            played = true;
            document.getElementById("btn").innerText = "⏸ Playing";
        }).catch(() => {
            document.getElementById("btn").innerText = "▶ Tap to Play";
        });
    };

    // try immediately
    tryPlay();

    // fallback for QR scanners / blocked autoplay
    document.body.addEventListener("click", tryPlay, { once: true });

    audio.oncanplaythrough = () => {
        document.getElementById("status").innerText = "Ready";
        tryPlay();
    };
}

function playAudio() {
    if (!audio) return;
    audio.play();
    document.getElementById("btn").innerText = "⏸ Playing";
}

init();

</script>

</body>
</html>
